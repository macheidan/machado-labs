name: Deploy to HostGator

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /
          local-dir: ./dist/
          protocol: ftps
          security: loose
          dangerous-clean-slate: false

      - name: Notify IndexNow
        run: |
          set -e
          KEY="24100a5ba16c1c93f366c99b706040bb"
          HOST="fabiomachado.com.br"
          KEY_LOCATION="https://${HOST}/${KEY}.txt"

          # Wait briefly so the FTP upload settles before crawlers fetch
          sleep 30

          # Extract URLs from the freshly built sitemap
          URLS=$(grep -oE '<loc>[^<]+</loc>' dist/sitemap-0.xml | sed -E 's|</?loc>||g')
          if [ -z "$URLS" ]; then
            echo "No URLs found in sitemap; skipping IndexNow notification."
            exit 0
          fi

          # Build JSON payload
          URL_LIST_JSON=$(echo "$URLS" | jq -R . | jq -s .)
          PAYLOAD=$(jq -n \
            --arg host "$HOST" \
            --arg key "$KEY" \
            --arg keyLocation "$KEY_LOCATION" \
            --argjson urlList "$URL_LIST_JSON" \
            '{host:$host, key:$key, keyLocation:$keyLocation, urlList:$urlList}')

          echo "Submitting $(echo "$URLS" | wc -l) URLs to IndexNow"
          echo "$PAYLOAD"

          HTTP_STATUS=$(curl -sS -o /tmp/indexnow.body -w "%{http_code}" \
            -X POST "https://api.indexnow.org/IndexNow" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$PAYLOAD")

          echo "IndexNow response: HTTP $HTTP_STATUS"
          cat /tmp/indexnow.body || true

          # IndexNow returns 200 (accepted) or 202 (accepted, pending validation).
          if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "202" ]; then
            exit 0
          else
            echo "IndexNow rejected the submission (HTTP $HTTP_STATUS)."
            exit 1
          fi
