backend:
  name: github
  repo: macheidan/machado-labs
  branch: master
  base_url: https://sveltia-auth.machadofabio.workers.dev

site_url: https://fabiomachado.com.br
display_url: https://fabiomachado.com.br
logo_url: /favicon.png

media_folder: /src/content/imgs
public_folder: /src/content/imgs

# Estilos aplicados na pré-visualização do markdown e no editor rich-text
# (replica o .post-body do BlogPost.astro raycast)
preview_styles:
  - /admin/preview.css

collections:
  - name: pages
    label: Páginas
    files:
      - name: home-pt
        label: Home (PT)
        file: src/content/site/home-pt.json
        format: json
        fields:
          - { name: heroTitle, label: 'Título (HTML)', widget: string, hint: 'Use <em>palavra</em> pra italic gradient e <span class="accent">palavra</span> pra accent gradient.' }
          - { name: sub, label: 'Subtítulo', widget: text }
          - { name: ctaPrimary, label: 'Botão primário', widget: string, default: 'Arquivo Completo' }
          - { name: ctaSecondary, label: 'Botão secundário', widget: string, required: false, default: 'Sobre o autor' }
      - name: home-en
        label: Home (EN)
        file: src/content/site/home-en.json
        format: json
        fields:
          - { name: heroTitle, label: 'Title (HTML)', widget: string, hint: 'Use <em>word</em> for italic gradient and <span class="accent">word</span> for accent gradient.' }
          - { name: sub, label: 'Subtitle', widget: text }
          - { name: ctaPrimary, label: 'Primary button', widget: string, default: 'Full Archive' }
          - { name: ctaSecondary, label: 'Secondary button', widget: string, required: false, default: 'About the author' }
      - name: about-pt
        label: Sobre (PT)
        file: src/content/about/about-pt.md
        format: yaml-frontmatter
        fields:
          - { name: heroTitle, label: 'Título (HTML)', widget: string, hint: 'Use <em>palavra</em> pra italic gradient.' }
          - { name: lede, label: 'Subtítulo', widget: text }
          - { name: body, label: 'Texto', widget: markdown }
      - name: about-en
        label: About (EN)
        file: src/content/about/about-en.md
        format: yaml-frontmatter
        fields:
          - { name: heroTitle, label: 'Title (HTML)', widget: string, hint: 'Use <em>word</em> for italic gradient.' }
          - { name: lede, label: 'Subtitle', widget: text }
          - { name: body, label: 'Body', widget: markdown }

  - name: posts-pt
    label: Posts (PT)
    folder: src/content/labs
    media_folder: '../imgs'
    public_folder: '../imgs'
    extension: md
    format: yaml-frontmatter
    create: true
    slug: '{{slug}}'
    sortable_fields: [pubDate, title]
    fields:
      - { name: title, label: 'Título', widget: string, hint: 'Texto puro. Máximo 3 linhas quando renderizado.' }
      - { name: heroTitle, label: 'Hero Title (estilizado)', widget: string, required: false, hint: 'Use <em>palavra</em> e <span class="accent">palavra</span> com <br/> manual. Máx 3 linhas.' }
      - { name: description, label: 'Descrição (SEO + sub)', widget: text }
      - { name: pubDate, label: 'Data de publicação', widget: datetime, date_format: 'MMM dd yyyy', time_format: false, format: 'MMM dd yyyy' }
      - { name: updatedDate, label: 'Data de atualização', widget: datetime, required: false, date_format: 'MMM dd yyyy', time_format: false, format: 'MMM dd yyyy' }
      - { name: heroImage, label: 'Imagem do hero', widget: image, required: false }
      - { name: heroAlt, label: 'Alt da imagem', widget: string, required: false }
      - { name: tags, label: 'Tags', widget: list, required: false, default: [] }
      - { name: keywords, label: 'Keywords (SEO)', widget: list, required: false }
      - { name: body, label: 'Corpo', widget: markdown, hint: 'Use ## subheads, **negrito**, *itálico*, > blockquotes. Termine com --- antes da reflexão final. Bloco ## Stack no fim quando técnico.' }

  - name: emails
    label: Emails
    label_singular: Email
    folder: data/subscribers
    extension: json
    format: json
    create: false
    delete: true
    identifier_field: email
    sortable_fields: [subscribedAt, email]
    summary: '{{fields.email}} — {{fields.subscribedAt}}'
    fields:
      - { name: email, label: 'Email', widget: string }
      - { name: subscribedAt, label: 'Inscrito em', widget: datetime, format: 'yyyy-MM-dd HH:mm', date_format: 'yyyy-MM-dd', time_format: 'HH:mm' }
      - { name: source, label: 'Origem', widget: string, required: false }
      - { name: lang, label: 'Idioma', widget: string, required: false }

  - name: posts-en
    label: Posts (EN)
    folder: src/content/labs-en
    media_folder: '../imgs'
    public_folder: '../imgs'
    extension: md
    format: yaml-frontmatter
    create: true
    slug: '{{slug}}'
    sortable_fields: [pubDate, title]
    fields:
      - { name: title, label: 'Title', widget: string, hint: 'Plain text. Max 3 lines when rendered.' }
      - { name: heroTitle, label: 'Hero Title (styled)', widget: string, required: false, hint: 'Use <em>word</em> and <span class="accent">word</span> with manual <br/>. Max 3 lines.' }
      - { name: description, label: 'Description', widget: text }
      - { name: pubDate, label: 'Publish date', widget: datetime, date_format: 'MMM dd yyyy', time_format: false, format: 'MMM dd yyyy' }
      - { name: updatedDate, label: 'Updated date', widget: datetime, required: false, date_format: 'MMM dd yyyy', time_format: false, format: 'MMM dd yyyy' }
      - { name: heroImage, label: 'Hero image', widget: image, required: false }
      - { name: heroAlt, label: 'Image alt', widget: string, required: false }
      - { name: tags, label: 'Tags', widget: list, required: false, default: [] }
      - { name: keywords, label: 'Keywords (SEO)', widget: list, required: false }
      - { name: body, label: 'Body', widget: markdown }
