<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#07080a" />
<meta name="robots" content="noindex,nofollow" />
<title>Dashboard · Fábio Machado</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css" />
<style>
  /* ===== tokens — dark (igual ao dash raiz / Shell.astro) ===== */
  :root{
    --grey-50:#e6e6e6; --grey-100:#cdcece; --grey-200:#9c9c9d; --grey-300:#6a6b6c;
    --grey-400:#434345; --grey-700:#111214; --grey-900:#07080a; --white:#fff;
    --fg:#fff; --fg-soft:#9c9c9d; --fg-muted:#6a6b6c; --fg-faint:#434345;
    --card:linear-gradient(137deg,#111214 4.87%,#0c0d0f 75.88%);
    --line:rgba(255,255,255,.06); --line-strong:rgba(255,255,255,.12);
    --o-soft:rgba(255,255,255,.035); --o-mid:rgba(255,255,255,.05);
    --o-strong:rgba(255,255,255,.08); --o-hover:rgba(255,255,255,.11);
    --scroll:rgba(255,255,255,.10); --scroll-h:rgba(255,255,255,.2);
    --sel-bg:#fff; --sel-fg:#07080a;
    --accent:#ff5c2b; --accent-soft:rgba(255,92,43,.16); --accent-2:#c93d18;
    --violet:#8e6bff; --cyan:#4dd4ff; --pink:#ff5fa8; --green:#27d796;
    --bg:var(--grey-900);
    --nav-bg:linear-gradient(137deg,rgba(17,18,20,.75) 4.87%,rgba(12,13,15,.9) 75.88%);
    --nav-inset:inset 0 1px 1px 0 rgba(255,255,255,.15);
    --card-shadow:0 1px 0 rgba(255,255,255,.03) inset,0 20px 50px -30px rgba(0,0,0,.8);
    --veil:rgba(7,8,10,.55); --veil-end:var(--bg); --aurora-op:1; --grain:rgba(255,255,255,.012);
    --font:'Inter','Inter Fallback',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --mono:'Geist Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --r-sm:6px; --r:8px; --r-md:12px; --r-lg:16px;
    --s1:8px; --s2:16px; --s3:24px; --s4:32px;
    --nav-h:58px; --offset:88px; --maxw:1340px;
  }
  @media (min-width:721px){ :root{ --nav-h:64px; --offset:96px; } }

  /* ===== tokens — light (mesmo layout, repintado claro) ===== */
  body.light{
    --fg:#17130d; --fg-soft:#3a352c; --fg-muted:#6a6253; --fg-faint:#9b9180;
    --card:linear-gradient(137deg,#ffffff 4.87%,#f7f4ec 75.88%);
    --line:rgba(0,0,0,.10); --line-strong:rgba(0,0,0,.16);
    --o-soft:rgba(0,0,0,.035); --o-mid:rgba(0,0,0,.05);
    --o-strong:rgba(0,0,0,.08); --o-hover:rgba(0,0,0,.10);
    --scroll:rgba(0,0,0,.18); --scroll-h:rgba(0,0,0,.32);
    --sel-bg:#dd3b1a; --sel-fg:#fff;
    --accent:#dd3b1a; --accent-soft:rgba(221,59,26,.12); --accent-2:#b62f12; --green:#2f7d52;
    --bg:#f4f1ea;
    --nav-bg:linear-gradient(137deg,rgba(255,255,255,.82) 4.87%,rgba(247,244,236,.92) 75.88%);
    --nav-inset:inset 0 1px 1px 0 rgba(255,255,255,.7);
    --card-shadow:0 1px 0 rgba(255,255,255,.6) inset,0 16px 34px -26px rgba(0,0,0,.35);
    --veil:rgba(244,241,234,.4); --veil-end:var(--bg); --aurora-op:.5; --grain:rgba(0,0,0,.014);
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--fg)}
  body{font-family:var(--font);font-size:16px;line-height:1.5;letter-spacing:.2px;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    min-height:100vh;min-height:100dvh;overflow-x:hidden;transition:background .3s,color .3s}
  a{color:inherit;text-decoration:none}
  button{font:inherit}
  ::selection{background:var(--sel-bg);color:var(--sel-fg)}
  .scroll{scrollbar-width:thin;scrollbar-color:var(--scroll) transparent}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:var(--scroll);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:var(--scroll-h)}

  /* aurora */
  .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;opacity:var(--aurora-op);transition:opacity .3s}
  .aurora .blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.5}
  .aurora .b1{width:60vw;height:60vw;top:-18vw;left:-14vw;background:radial-gradient(circle,var(--accent) 0%,transparent 70%);animation:d1 24s ease-in-out infinite}
  .aurora .b2{width:55vw;height:55vw;top:-8vw;right:-16vw;background:radial-gradient(circle,var(--violet) 0%,transparent 70%);opacity:.45;animation:d2 30s ease-in-out infinite}
  .aurora .b3{width:65vw;height:65vw;left:18vw;top:32vh;background:radial-gradient(circle,var(--cyan) 0%,transparent 65%);filter:blur(110px);opacity:.22;animation:d3 36s ease-in-out infinite}
  .aurora .b4{width:45vw;height:45vw;right:10vw;bottom:-10vw;background:radial-gradient(circle,var(--pink) 0%,transparent 70%);filter:blur(100px);opacity:.26;animation:d4 28s ease-in-out infinite}
  .aurora::after{content:'';position:absolute;inset:0;background:
    radial-gradient(ellipse at 50% 0%,transparent 0%,var(--veil) 60%,var(--veil-end) 100%),
    repeating-linear-gradient(0deg,var(--grain) 0 1px,transparent 1px 3px)}
  @keyframes d1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(40px,30px) scale(1.06)}}
  @keyframes d2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-50px,40px) scale(1.08)}}
  @keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-40px) scale(1.05)}}
  @keyframes d4{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-30px,-25px) scale(1.07)}}
  @media (prefers-reduced-motion:reduce){.aurora .blob{animation:none}}

  /* navbar pílula */
  .nav-container{position:fixed;top:0;left:50%;z-index:50;display:flex;justify-content:center;
    width:100%;padding:var(--s2) var(--s2) 0;transform:translateX(-50%);pointer-events:none}
  .navbar{pointer-events:auto;display:flex;align-items:center;justify-content:space-between;
    width:100%;max-width:var(--maxw);height:var(--nav-h);padding:var(--s2) var(--s3);
    background:var(--nav-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--nav-inset)}
  .brand{display:inline-flex;align-items:center;gap:var(--s1);font-size:14px;font-weight:600;letter-spacing:.2px;color:var(--fg);white-space:nowrap}
  .brand .mark{width:20px;height:20px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--accent),var(--pink));box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
  .brand .slash{color:var(--fg-faint);font-weight:400}
  .brand .tag{color:var(--fg-muted);font-weight:500}
  .nav-right{display:flex;align-items:center;gap:var(--s2)}
  .nav-date{font-family:var(--mono);font-size:12.5px;color:var(--fg-soft);letter-spacing:0;white-space:nowrap}
  .nav-date::first-letter{text-transform:uppercase}
  .nav-btns{display:flex;align-items:center;gap:8px}
  .iconbtn{width:34px;height:34px;display:grid;place-items:center;border-radius:var(--r);
    color:var(--fg-soft);background:linear-gradient(180deg,var(--o-soft),var(--o-strong));
    box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 0 0 1px var(--line-strong);
    border:0;cursor:pointer;font-size:17px;transition:transform .1s,color .2s}
  .iconbtn:hover{color:var(--fg)}
  .iconbtn:active{transform:scale(.94)}
  .iconbtn.spin i{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* layout */
  .dash{position:relative;z-index:1;max-width:var(--maxw);margin:0 auto;padding:var(--offset) var(--s2) var(--s4)}
  .meta{display:flex;align-items:center;justify-content:space-between;gap:var(--s2);flex-wrap:wrap;margin-bottom:var(--s2)}
  .hello{font-size:clamp(20px,2.4vw,30px);font-weight:700;letter-spacing:-.5px}
  .hello b{background:linear-gradient(120deg,var(--accent) 0%,var(--pink) 55%,var(--violet) 100%);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
  .meta-right{display:flex;align-items:center;gap:var(--s1)}
  .ctx{display:flex;align-items:center;gap:var(--s1);flex-wrap:wrap}
  .pill{display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:999px;background:var(--o-soft);border:1px solid var(--line);font-size:12.5px}
  .pill i{font-size:15px;color:var(--accent)}
  .pill .k{color:var(--fg-muted);font-family:var(--mono);font-size:11px;letter-spacing:0;text-transform:uppercase}
  .pill b{font-family:var(--mono);font-weight:500}
  .delta{font-family:var(--mono);font-size:11px;font-weight:500;display:flex;align-items:center;gap:1px}
  .delta i{font-size:13px}
  .delta.up{color:var(--green)}.delta.down{color:var(--accent)}

  .grid{display:grid;gap:var(--s2);grid-template-columns:362px minmax(0,1fr) 392px;
    grid-template-areas:"ops market tools";align-items:start}
  .zone{display:flex;flex-direction:column;gap:var(--s2);min-width:0}
  .zone.ops{grid-area:ops}.zone.market{grid-area:market}.zone.tools{grid-area:tools}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);
    padding:var(--s2);display:flex;flex-direction:column;min-width:0;box-shadow:var(--card-shadow)}
  .ch{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
  .ch .lbl{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--fg-muted)}
  .ch .lbl i{font-size:16px;color:var(--accent)}
  .ch .lbl .sub{font-family:var(--mono);font-size:11px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--fg-faint)}
  .ch-r{display:flex;align-items:center;gap:6px}
  .mini{width:28px;height:28px;display:grid;place-items:center;border-radius:var(--r-sm);background:var(--o-mid);border:1px solid var(--line);color:var(--fg-muted);cursor:pointer;font-size:15px;transition:.15s}
  .mini:hover{background:var(--o-hover);color:var(--fg)}
  .mini:active{transform:scale(.92)}
  .mini:disabled{opacity:.28;cursor:default}
  .mini.spin i{animation:sp 1s linear infinite}

  /* vendas */
  .v-top{display:flex;align-items:flex-end;gap:11px;flex-wrap:wrap}
  .v-tot{font-family:var(--mono);font-size:clamp(30px,3vw,42px);font-weight:600;letter-spacing:-1.5px;line-height:.9;color:var(--fg)}
  .v-tot .c{font-size:.46em;color:var(--fg-muted);margin-right:4px;letter-spacing:0}
  .v-d{font-family:var(--mono);font-size:13px;font-weight:500;display:flex;align-items:center;gap:2px;padding-bottom:6px}
  .v-d i{font-size:15px}
  .v-d.up{color:var(--green)}.v-d.down{color:var(--accent)}
  .v-d .vs{color:var(--fg-faint);font-size:10.5px;margin-left:3px}
  .v-sub{font-family:var(--mono);font-size:11.5px;color:var(--fg-muted);margin-top:7px;letter-spacing:0}
  .v-sub b{color:var(--fg-soft);font-weight:500}
  .v-split{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:15px}
  .v-st{background:var(--o-soft);border:1px solid var(--line);border-radius:var(--r-md);padding:11px 12px}
  .v-st .nm{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:600;color:var(--fg-muted);text-transform:uppercase;letter-spacing:.5px}
  .v-st .nm .dot{width:8px;height:8px;border-radius:50%}
  .v-st .vv{font-family:var(--mono);font-size:17px;font-weight:600;letter-spacing:-.5px;margin:6px 0 2px;color:var(--fg)}
  .v-st .ss{font-family:var(--mono);font-size:10.5px;color:var(--fg-faint);letter-spacing:0}
  .v-spark{display:flex;align-items:flex-end;gap:5px;height:44px;margin-top:20px}
  .v-bar{flex:1;border-radius:4px 4px 2px 2px;background:var(--o-strong);position:relative;min-height:5px;cursor:pointer;transition:filter .15s}
  .v-bar.on{background:linear-gradient(180deg,var(--accent),var(--accent-2))}
  .v-bar:hover{filter:brightness(1.3)}
  .v-bar .bl{position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;color:var(--fg-faint)}
  .v-month{margin-top:18px;padding-top:13px;border-top:1px solid var(--line);display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
  .v-month .ml{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--fg-muted);font-weight:700}
  .v-month .mm{font-family:var(--mono);font-size:10.5px;color:var(--fg-faint);margin-top:3px;letter-spacing:0}
  .v-month .mv{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:-.5px;color:var(--fg);white-space:nowrap}
  .v-month .mv .c{font-size:.6em;color:var(--fg-muted);margin-right:2px}

  /* foco (lista de tarefas) */
  .foco{background:linear-gradient(137deg,var(--accent-soft),rgba(142,107,255,.05));border-color:var(--accent-soft)}
  .foco-add{display:flex;gap:6px;margin-bottom:10px}
  .foco-add input{flex:1;min-width:0;background:var(--o-soft);border:1px solid var(--line);border-radius:var(--r);color:var(--fg);font:inherit;font-size:13px;padding:8px 11px;outline:none}
  .foco-add input::placeholder{color:var(--fg-faint)}
  .foco-add input:focus{border-color:var(--line-strong)}
  .foco-list{display:flex;flex-direction:column}
  .fitem{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-top:1px solid var(--line);position:relative}
  .fitem:first-child{border-top:0}
  .fcheck{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line-strong);flex:0 0 auto;cursor:pointer;margin-top:1px;display:grid;place-items:center;color:#fff;font-size:12px;background:transparent;transition:.15s}
  .fcheck i{opacity:0}
  .fcheck:hover{border-color:var(--accent)}
  .fitem.arch .fcheck{background:var(--accent);border-color:var(--accent)}
  .fitem.arch .fcheck i{opacity:1}
  .ftext{flex:1;min-width:0;font-size:13px;line-height:1.4;color:var(--fg-soft);cursor:text;word-break:break-word;outline:none}
  .ftext:focus{border-bottom:1px dashed var(--accent)}
  .fitem.arch .ftext{color:var(--fg-faint);text-decoration:line-through}
  .fdots{flex:0 0 auto;color:var(--fg-faint);cursor:pointer;font-size:16px;line-height:1;padding:0 2px;opacity:.5;transition:.15s}
  .fitem:hover .fdots{opacity:1}
  .fmenu{position:absolute;right:0;top:24px;z-index:25;background:var(--card);border:1px solid var(--line-strong);border-radius:var(--r);box-shadow:0 14px 34px -12px rgba(0,0,0,.7);padding:4px;min-width:130px}
  .fmenu button{display:flex;align-items:center;gap:8px;width:100%;background:none;border:0;color:var(--fg-soft);font:inherit;font-size:12.5px;padding:8px 10px;border-radius:6px;cursor:pointer;text-align:left}
  .fmenu button:hover{background:var(--o-soft)}
  .fmenu button.del{color:#ff6b5e}
  .fmenu button.del:hover{background:rgba(255,107,94,.12)}
  .foco-arch{align-self:flex-start;margin-top:8px;background:none;border:0;color:var(--fg-faint);font:inherit;font-size:11.5px;font-weight:500;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:5px}
  .foco-arch:hover{color:var(--fg-soft)}
  .foco-arch i{font-size:14px}
  .foco-empty{font-size:12.5px;color:var(--fg-faint);padding:8px 2px}

  /* listas */
  .list{display:flex;flex-direction:column;overflow-y:auto;margin:0 -4px;padding:0 4px}
  .empty{font-size:13px;color:var(--fg-faint);padding:14px 2px}
  .ag{display:flex;gap:12px;padding:9px 0;border-top:1px solid var(--line)}
  .ag:first-child{border-top:0}
  .ag .hr{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--accent);min-width:42px}
  .ag .desc{font-size:13px;color:var(--fg-soft);line-height:1.35}
  .pj{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .pj:first-child{border-top:0}
  .pj .pn{font-size:13px;font-weight:500;color:var(--fg)}
  .pj .ps{font-family:var(--mono);font-size:10.5px;color:var(--fg-faint);margin-top:1px}
  .pbadge{font-family:var(--mono);font-size:10px;font-weight:500;padding:3px 9px;border-radius:999px;background:var(--accent-soft);color:var(--accent);flex:0 0 auto}

  /* item de notícia */
  .item{display:flex;gap:12px;padding:11px 8px;align-items:center;border-radius:var(--r-md);transition:background .12s}
  .item:hover{background:var(--o-soft)}
  .thumb{width:72px;height:54px;border-radius:10px;object-fit:cover;flex:0 0 auto;background:var(--o-mid)}
  .ic-thumb{width:54px;height:54px;border-radius:10px;flex:0 0 auto;display:grid;place-items:center;background:var(--o-mid);position:relative;overflow:hidden}
  .ic-thumb i{font-size:20px;color:var(--accent)}
  .ic-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .item .body{flex:1;min-width:0}
  .item .ttl{font-size:13px;line-height:1.4;color:var(--fg);font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{display:flex;align-items:center;gap:7px;margin-top:5px;flex-wrap:wrap}
  .item .src{font-family:var(--mono);font-size:10.5px;color:var(--fg-muted);letter-spacing:0}
  .item .when{font-family:var(--mono);font-size:10.5px;color:var(--fg-faint);letter-spacing:0}
  .tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:5px;letter-spacing:.5px;text-transform:uppercase}
  .tag.mkt{background:var(--accent-soft);color:var(--accent)}
  .tag.claude{background:rgba(142,107,255,.16);color:#8e6bff}
  .tag.gpt{background:rgba(39,160,110,.16);color:#1f9d68}
  .tag.gemini{background:rgba(40,130,200,.16);color:#1f74b8}
  .tag.open{background:var(--accent-soft);color:var(--accent)}
  .tag.gen{background:var(--o-strong);color:var(--fg-muted)}

  /* github */
  .gh{display:flex;align-items:flex-start;justify-content:space-between;gap:11px;padding:11px 8px;border-radius:var(--r-md);transition:background .12s}
  .gh:hover{background:var(--o-soft)}
  .gh .repo{font-family:var(--mono);font-size:12.5px;font-weight:500;color:var(--fg)}
  .gh .ghd{font-size:11.5px;color:var(--fg-muted);line-height:1.4;margin:3px 0 4px}
  .gh .lang{font-family:var(--mono);font-size:10px;color:var(--fg-faint)}
  .gh .star{font-family:var(--mono);font-size:11.5px;color:var(--green);font-weight:500;display:flex;align-items:center;gap:3px;flex:0 0 auto}

  /* abas radar */
  .tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:13px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{display:flex;align-items:center;gap:5px;padding:7px 10px;border-radius:999px;background:var(--o-soft);border:1px solid var(--line);color:var(--fg-muted);font-size:11.5px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab i{font-size:14px}
  .tab:hover{color:var(--fg)}
  .tab.on{color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent}
  .subtabs{display:flex;gap:2px}
  .subtab{font-family:var(--mono);font-size:11px;color:var(--fg-muted);background:none;border:0;padding:4px 8px;border-radius:6px;cursor:pointer}
  .subtab:hover{color:var(--fg)}.subtab.on{color:var(--fg);background:var(--o-strong)}

  /* youtube */
  .yt{display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:560px;padding-right:3px}
  .ytc{display:grid;grid-template-columns:132px 1fr;gap:11px;align-items:start;cursor:pointer}

/* ===== helpers ===== */
const brl=n=>Number(n||0).toLocaleString('pt-BR');
const isUrl=s=>/^https?:/.test(s||'');
const thumb=n=>isUrl(n.img)?n.img:_img(n.img||'x');
const virg=v=>String(v).replace('.',',');
function ago(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return'';const m=Math.floor((Date.now()-d)/6e4);
  if(m<2)return'agora';if(m<60)return m+'min';const h=Math.floor(m/60);if(h<24)return h+'h';
  const dd=Math.floor(h/24);if(dd<7)return dd+'d';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});}
function saud(){const h=new Date().getHours();return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';}
document.getElementById('hello').innerHTML=saud()+', <b>Fábio</b>';

/* ===== tema (sol/lua) ===== */
function setTheme(t){
  document.body.classList.toggle('light',t==='light');
  document.getElementById('theme').querySelector('i').className='ti '+(t==='light'?'ti-sun':'ti-moon');
  document.querySelector('meta[name=theme-color]').setAttribute('content',t==='light'?'#f4f1ea':'#07080a');
  try{localStorage.setItem('dash-theme',t);}catch(e){}
}
setTheme((()=>{try{return localStorage.getItem('dash-theme')||'dark';}catch(e){return 'dark';}})());
document.getElementById('theme').onclick=()=>setTheme(document.body.classList.contains('light')?'dark':'light');

/* ===== topbar ===== */
function fillCtx(t){
  const c=document.getElementById('ctx');
  const delta=p=>{const up=(+p||0)>=0;return`<span class="delta ${up?'up':'down'}"><i class="ti ti-trending-${up?'up':'down'}"></i>${virg(Math.abs(+p||0))}%</span>`;};
  const bk=v=>v>=1000?virg((v/1000).toFixed(1))+'k':String(v);
  const clima=t&&t.clima, usd=t&&t.usd, btc=t&&t.btc;
  c.innerHTML=
    `<span class="pill"><i class="ti ti-cloud"></i><b>${clima?clima.temp:18}°</b><span class="k">POA</span></span>`+
    `<span class="pill"><i class="ti ti-currency-dollar"></i><span class="k">USD</span><b>${usd?virg(usd.valor.toFixed(2)):'5,42'}</b>${delta(usd?usd.pct:0.8)}</span>`+
    `<span class="pill"><i class="ti ti-currency-bitcoin"></i><span class="k">BTC</span><b>${btc?bk(btc.valor):'67,2k'}</b>${delta(btc?btc.pct:-1.2)}</span>`;
}

/* ===== vendas ===== */
let si=0;
let SALES_MONTH={mes:'2026-06',de:'2026-06-01',ate:'2026-06-26',dame:[182450,1584,1290],lov:[214300,1872,1410]};
const MESES=['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const vBody=document.getElementById('v-body'),vDay=document.getElementById('v-day'),vNav=document.getElementById('v-nav');
const totDia=d=>[d.dame[0]+d.lov[0],d.dame[1]+d.lov[1],d.dame[2]+d.lov[2]];
function monthBlock(){
  const m=SALES_MONTH;if(!m||!m.dame)return'';
  const t=[m.dame[0]+m.lov[0],m.dame[1]+m.lov[1],m.dame[2]+m.lov[2]];
  const mi=m.mes?(+m.mes.split('-')[1]-1):new Date().getMonth();
  let dias=0;try{dias=Math.round((new Date(m.ate)-new Date(m.de))/864e5)+1;}catch(e){}
  const media=dias>0?Math.round(t[0]/dias):t[0];
  return `<div class="v-month"><div><div class="ml">${MESES[mi]||'mês'} · mês até hoje</div>
    <div class="mm">${t[2]} pedidos · ${t[1]} pizzas · R$ ${brl(media)}/dia</div></div>
    <div class="mv"><span class="c">R$</span>${brl(t[0])}</div></div>`;
}
function drawSales(){
  const d=sales[si];if(!d){vBody.innerHTML='<div class="empty">sem dados de venda</div>';vNav.innerHTML='';return;}
  const tot=totDia(d),prev=sales[si+1];
  let dh='';
  if(prev){const p=totDia(prev)[0];const pct=p?((tot[0]-p)/p*100):0;const up=pct>=0;
    dh=`<div class="v-d ${up?'up':'down'}"><i class="ti ti-trending-${up?'up':'down'}"></i>${virg(Math.abs(pct).toFixed(0))}%<span class="vs">vs ${prev.dow.split(',')[0]}</span></div>`;}
  const serie=[...sales].slice(0,7).reverse();const max=Math.max(...serie.map(s=>totDia(s)[0]),1);const onIdx=serie.length-1-si;
  const bars=serie.map((s,i)=>{const v=totDia(s)[0],hp=Math.max(6,Math.round(v/max*100));const lb=(s.dow.match(/(\d+)/)||[])[1]||'';
    return`<div class="v-bar ${i===onIdx?'on':''}" data-i="${serie.length-1-i}" style="height:${hp}%" title="${s.dow}: R$ ${brl(v)}"><span class="bl">${lb}</span></div>`;}).join('');
  vDay.textContent='· '+d.dow;
  vBody.innerHTML=`<div class="v-top"><div class="v-tot"><span class="c">R$</span>${brl(tot[0])}</div>${dh}</div>
    <div class="v-sub"><b>${tot[2]}</b> pedidos &nbsp;·&nbsp; <b>${tot[1]}</b> pizzas</div>
    <div class="v-split">
      <div class="v-st"><div class="nm"><span class="dot" style="background:var(--pink)"></span>Dáme</div><div class="vv">R$ ${brl(d.dame[0])}</div><div class="ss">${d.dame[2]} ped · ${d.dame[1]} pz</div></div>
      <div class="v-st"><div class="nm"><span class="dot" style="background:var(--violet)"></span>Lov</div><div class="vv">R$ ${brl(d.lov[0])}</div><div class="ss">${d.lov[2]} ped · ${d.lov[1]} pz</div></div>
    </div>
    <div class="v-spark">${bars}</div>`+monthBlock();
  vBody.querySelectorAll('.v-bar').forEach(b=>b.onclick=()=>{si=+b.dataset.i;drawSales();});
  vNav.innerHTML=`<button class="mini" ${si===sales.length-1?'disabled':''} data-d="1"><i class="ti ti-chevron-left"></i></button><button class="mini" ${si===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-right"></i></button>`;
  vNav.querySelectorAll('button').forEach(b=>b.onclick=()=>{si=Math.max(0,Math.min(sales.length-1,si+ +b.dataset.d));drawSales();});
}

/* ===== agenda ===== */
let agi=0;
const agDay=document.getElementById('ag-day'),agNav=document.getElementById('ag-nav'),agList=document.getElementById('ag-list');
const DOW=['dom','seg','ter','qua','qui','sex','sáb'];
const ymd=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
function drawAgenda(){
  const base=new Date();base.setHours(0,0,0,0);const day=new Date(base);day.setDate(base.getDate()+agi);
  const label=agi===0?'hoje':agi===1?'amanhã':`${DOW[day.getDay()]} ${String(day.getDate()).padStart(2,'0')}/${String(day.getMonth()+1).padStart(2,'0')}`;
  const hasData=(AGENDA||[]).some(a=>a.data);
  const evs=hasData?AGENDA.filter(a=>a.data===ymd(day)):(agi===0?AGENDA:[]);
  agDay.textContent='· '+label;
  agList.innerHTML=evs.length?evs.map(a=>`<div class="ag"><div class="hr">${a.h}</div><div class="desc">${a.d}</div></div>`).join(''):`<div class="empty">sem compromissos</div>`;
  agNav.innerHTML=`<button class="mini" ${agi===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-left"></i></button><button class="mini" ${agi===7?'disabled':''} data-d="1"><i class="ti ti-chevron-right"></i></button>`;
  agNav.querySelectorAll('button').forEach(b=>b.onclick=()=>{agi=Math.max(0,Math.min(7,agi+ +b.dataset.d));drawAgenda();});
}

/* ===== foco (lista de tarefas/lembretes, salva no servidor foco.php) ===== */

const FOCO_SEED=[
  'Projeto de IA food-service ate 15/11 = gatilho pra vender as pizzarias',

];
const fid=()=>'f'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3);
const fesc=s=>(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const focoLocal={get(){try{return JSON.parse(localStorage.getItem('foco-itens')||'null')}catch(e){return null}},set(v){try{localStorage.setItem('foco-itens',JSON.stringify(v))}catch(e){}}};
function focoSeed(){return FOCO_SEED.map(t=>({id:fid(),text:t,arch:false,ts:Date.now()}));}
function focoLoad(){
  fetch('foco.php?t='+Date.now()).then(r=>r.ok?r.json():null).then(d=>{
    if(d&&Array.isArray(d.items)) FOCO=d.items.length?d.items:focoSeed();
    else FOCO=focoLocal.get()||focoSeed();
    drawFoco();
  }).catch(()=>{FOCO=focoLocal.get()||focoSeed();drawFoco();});
}
function focoSave(now){
  focoLocal.set(FOCO);
  clearTimeout(focoSaveT);
  const go=()=>fetch('foco.php',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({items:FOCO})}).catch(()=>{});
  if(now) go(); else focoSaveT=setTimeout(go,600);
}
function fRow(it){
  return `<div class="fitem ${it.arch?'arch':''}" data-id="${it.id}">
    <div class="fcheck" data-act="check" title="${it.arch?'desarquivar':'arquivar'}"><i class="ti ti-check"></i></div>
    <div class="ftext" data-act="text">${fesc(it.text)}</div>
    <div class="fdots" data-act="menu"><i class="ti ti-dots"></i></div></div>`;
}
function drawFoco(){
  const list=document.getElementById('foco-list');
  const ativos=FOCO.filter(x=>!x.arch), arq=FOCO.filter(x=>x.arch);
  document.getElementById('foco-status').textContent=ativos.length?ativos.length+(ativos.length>1?' itens':' item'):'';
  const show=focoShowArch?FOCO:ativos;
  list.innerHTML=show.length?show.map(fRow).join(''):`<div class="foco-empty">tudo limpo ✦</div>`;
  const at=document.getElementById('foco-arch');
  if(arq.length){at.style.display='flex';at.innerHTML=`<i class="ti ti-archive"></i>${focoShowArch?'ocultar':'ver'} arquivados (${arq.length})`;}
  else at.style.display='none';
}
function focoAdd(){
  const inp=document.getElementById('foco-input'),t=inp.value.trim();if(!t)return;
  FOCO.unshift({id:fid(),text:t,arch:false,ts:Date.now()});inp.value='';drawFoco();focoSave(true);
}
function editFText(row,it){
  const el=row.querySelector('.ftext');
  if(el.getAttribute('contenteditable')==='true')return;
  el.setAttribute('contenteditable','true');el.focus();
  const r=document.createRange();r.selectNodeContents(el);r.collapse(false);
  const sel=getSelection();sel.removeAllRanges();sel.addRange(r);
  const done=()=>{el.removeAttribute('contenteditable');const v=el.innerText.trim();
    if(v&&v!==it.text){it.text=v;focoSave(true);}else if(!v){drawFoco();}
    el.removeEventListener('blur',done);};
  el.addEventListener('blur',done);
  el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}if(e.key==='Escape'){el.innerText=it.text;el.blur();}});
}
function closeFMenu(){document.querySelectorAll('.fmenu').forEach(m=>m.remove());}
function openFMenu(row,it){
  closeFMenu();
  const m=document.createElement('div');m.className='fmenu';
  m.innerHTML=`<button data-m="arch"><i class="ti ti-${it.arch?'archive-off':'archive'}"></i>${it.arch?'desarquivar':'arquivar'}</button><button class="del" data-m="del"><i class="ti ti-trash"></i>excluir</button>`;
  row.appendChild(m);
  m.addEventListener('click',e=>{const a=e.target.closest('[data-m]');if(!a)return;
    if(a.dataset.m==='arch'){it.arch=!it.arch;}else{FOCO=FOCO.filter(x=>x.id!==it.id);}
    closeFMenu();drawFoco();focoSave(true);});
}
document.getElementById('foco-add-btn').onclick=focoAdd;
document.getElementById('foco-input').addEventListener('keydown',e=>{if(e.key==='Enter')focoAdd();});
document.getElementById('foco-arch').onclick=()=>{focoShowArch=!focoShowArch;drawFoco();};
document.getElementById('foco-list').addEventListener('click',e=>{
  const row=e.target.closest('.fitem');if(!row)return;
  const it=FOCO.find(x=>x.id===row.dataset.id);if(!it)return;
  const at=e.target.closest('[data-act]');const act=at?at.dataset.act:null;
  if(act==='check'){it.arch=!it.arch;drawFoco();focoSave(true);}
  else if(act==='menu'){openFMenu(row,it);}
  else if(act==='text'){editFText(row,it);}
});
document.addEventListener('click',e=>{if(!e.target.closest('.fdots')&&!e.target.closest('.fmenu'))closeFMenu();});

/* ===== rows ===== */
const newsRow=(n,i)=>`<a class="item" data-i="${i}" href="${n.url||'#'}" target="_blank" rel="noopener"><img class="thumb" src="${thumb(n)}" alt="" onerror="this.style.visibility='hidden'"><div class="body"><div class="ttl">${n.t}</div><div class="meta">${n.cat?`<span class="tag ${n.c||'gen'}">${n.cat}</span>`:''}<span class="src">${n.src||''}</span>${n.data?`<span class="when">· ${ago(n.data)}</span>`:''}</div></div></a>`;
const feedRow=(f,i)=>`<a class="item" data-i="${i}" href="${f.url||'#'}" target="_blank" rel="noopener"><span class="ic-thumb"><i class="ti ${f.i||'ti-rss'}"></i>${f.img?`<img src="${f.img}" loading="lazy" onerror="this.remove()">`:''}</span><div class="body"><div class="ttl">${f.h}</div><div class="meta"><span class="src">${f.n}</span>${f.data?`<span class="when">· ${ago(f.data)}</span>`:''}</div></div></a>`;
const ghRow=g=>`<a class="gh" href="https://github.com/${g.r}" target="_blank" rel="noopener"><div><div class="repo">${g.r}</div><div class="ghd">${g.d||''}</div><div class="lang">${g.lang||''}</div></div><div class="star"><i class="ti ti-star"></i>${g.s||''}</div></a>`;

function attachDetail(listEl, getItems){
  listEl.onclick=e=>{
    const el=e.target.closest('.item');if(!el)return;
    if(e.metaKey||e.ctrlKey||e.shiftKey)return;
    const items=getItems();const it=items[+el.dataset.i];if(!it||!(it.resumo))return;
    e.preventDefault();
    const title=it.t||it.h||'',src=it.src||it.n||'';
    listEl.dataset.prev=listEl.innerHTML;
    listEl.innerHTML=`<div class="detail"><button class="d-back"><i class="ti ti-arrow-left"></i> voltar</button>
      <div class="d-ttl">${title}</div>
      <div class="d-src">${it.cat?`<span class="tag ${it.c||'gen'}">${it.cat}</span>`:''}<span>${src}</span>${it.data?`· ${ago(it.data)}`:''}</div>
      <div class="d-body">${it.resumo}</div>
      <a class="d-link" href="${it.url||'#'}" target="_blank" rel="noopener">ler no original <i class="ti ti-external-link"></i></a></div>`;
    listEl.querySelector('.d-back').onclick=()=>{listEl.innerHTML=listEl.dataset.prev;};
  };
}
function renderList(id,items,row){const el=document.getElementById(id);el.innerHTML=(items&&items.length)?items.map(row).join(''):`<div class="empty">nada por aqui agora</div>`;}

/* ===== mercado ===== */
function drawMarket(){renderList('mkt-list',MKT,newsRow);}
attachDetail(document.getElementById('mkt-list'),()=>MKT);

/* ===== youtube ===== */
function drawYT(){
  const el=document.getElementById('yt-list');
  el.innerHTML=(YT&&YT.length)?YT.map(v=>`<div class="ytc" data-vid="${v.vid}">
    <div class="th"><img src="${v.img||('https://i.ytimg.com/vi/'+v.vid+'/hqdefault.jpg')}" loading="lazy" alt=""><span class="play"><i class="ti ti-player-play-filled"></i></span></div>
    <div><div class="yt-t">${v.t}</div><div class="yt-m">${v.canal||''}${v.cat?` · <span class="cat">${v.cat}</span>`:''}${v.data?` · ${ago(v.data)}`:''}</div></div></div>`).join('')
    :`<div class="empty">sem vídeos</div>`;
  el.querySelectorAll('.ytc').forEach(c=>c.onclick=()=>openYT(c.dataset.vid));
}
function openYT(vid){document.getElementById('modal-player').innerHTML=`<iframe src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;document.getElementById('modal').classList.add('on');}
function closeYT(){document.getElementById('modal').classList.remove('on');document.getElementById('modal-player').innerHTML='';}
document.getElementById('modal-x').onclick=closeYT;
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeYT();};
addEventListener('keydown',e=>{if(e.key==='Escape')closeYT();});

/* ===== instagram (1 post por vez + nav) ===== */
let igA=0,igP=0;
function drawIG(){
  const accBar=document.getElementById('ig-acc'),frame=document.getElementById('ig-frame'),postBar=document.getElementById('ig-post');
  if(!IG_DATA.length){accBar.innerHTML='';postBar.innerHTML='';frame.innerHTML='<div class="empty" style="padding:24px">sem contas</div>';return;}
  igA=Math.max(0,Math.min(IG_DATA.length-1,igA));
  const a=IG_DATA[igA],posts=a.posts||[];
  igP=Math.max(0,Math.min(Math.max(0,posts.length-1),igP));
  accBar.innerHTML=`<button class="mini" id="acc-prev" ${igA===0?'disabled':''}><i class="ti ti-chevron-left"></i></button>
    <span class="ig-handle">@${a.conta}${IG_DATA.length>1?`<span class="c">${igA+1}/${IG_DATA.length}</span>`:''}</span>
    <button class="mini" id="acc-next" ${igA===IG_DATA.length-1?'disabled':''}><i class="ti ti-chevron-right"></i></button>`;
  const code=posts[igP]?posts[igP].code:null;
  frame.innerHTML=code?`<iframe src="https://www.instagram.com/p/${code}/embed/captioned/" loading="lazy" scrolling="no" allowtransparency="true"></iframe>`:`<div class="empty" style="padding:24px">sem posts novos</div>`;
  postBar.innerHTML=`<button class="mini" id="post-prev" ${igP===0?'disabled':''}><i class="ti ti-chevron-left"></i></button>
    <span class="ig-count">post ${posts.length?igP+1:0} / ${posts.length}</span>
    <button class="mini" id="post-next" ${igP>=posts.length-1?'disabled':''}><i class="ti ti-chevron-right"></i></button>`;
  document.getElementById('acc-prev').onclick=()=>{igA--;igP=0;drawIG();};
  document.getElementById('acc-next').onclick=()=>{igA++;igP=0;drawIG();};
  document.getElementById('post-prev').onclick=()=>{igP--;drawIG();};
  document.getElementById('post-next').onclick=()=>{igP++;drawIG();};
}

/* ===== radar IA (abas, com Product Hunt) ===== */
const TABS=[{k:'ia',label:'Fronteira',icon:'ti-cpu'},{k:'github',label:'GitHub',icon:'ti-brand-github'},{k:'ph',label:'Launches',icon:'ti-rocket'},{k:'news',label:'News',icon:'ti-mail'},{k:'feeds',label:'Feeds',icon:'ti-rss'}];
let rtab='ia',ghp='day';
const rList=document.getElementById('r-list'),ghSub=document.getElementById('gh-sub');
function rData(){
  if(rtab==='ia')   return{items:AI,row:newsRow};
  if(rtab==='ph')   return{items:PH,row:newsRow};
  if(rtab==='news') return{items:newsletters,row:feedRow};
  if(rtab==='feeds')return{items:(feeds||[]).slice(0,24),row:feedRow};
  return{items:((github&&github[ghp])||[]).slice(0,10),row:ghRow};
}
function drawTabs(){document.getElementById('r-tabs').innerHTML=TABS.map(t=>`<button class="tab ${t.k===rtab?'on':''}" data-k="${t.k}"><i class="ti ${t.icon}"></i>${t.label}</button>`).join('');}
function drawRadar(){
  ghSub.style.display=rtab==='github'?'flex':'none';
  if(rtab==='github'&&!ghSub.innerHTML)ghSub.innerHTML=`<button class="subtab on" data-p="day">dia</button><button class="subtab" data-p="week">sem</button><button class="subtab" data-p="month">mês</button>`;
  const {items,row}=rData();
  rList.innerHTML=(items&&items.length)?items.map(row).join(''):`<div class="empty">nada por aqui agora</div>`;
  rList.scrollTop=0;
}
attachDetail(rList,()=>rData().items);
document.getElementById('r-tabs').onclick=e=>{const b=e.target.closest('.tab');if(!b)return;rtab=b.dataset.k;drawTabs();drawRadar();};
ghSub.onclick=e=>{const b=e.target.closest('.subtab');if(!b)return;ghp=b.dataset.p;ghSub.querySelectorAll('.subtab').forEach(x=>x.classList.toggle('on',x===b));drawRadar();};

/* ===== render geral ===== */
const pick=(a,b)=>(a&&a.length)?a:b;
function render(d){
  d=d||{};
  fillCtx(d.topbar);
  if(d.sales_month)SALES_MONTH=d.sales_month;
  sales=pick(d.sales,sales);si=0;drawSales();
  AGENDA=(d.agenda&&d.agenda.length)?d.agenda:AGENDA;agi=0;drawAgenda();
  projects=pick(d.projects,projects);drawProjects();
  MKT=pick(d.biz,MKT);drawMarket();
  YT=pick(d.youtube,YT);drawYT();
  if(d.instagram&&d.instagram.length){const ig=d.instagram.filter(x=>x&&x.posts&&x.posts.length);if(ig.length){IG_DATA=ig;igA=0;igP=0;}}
  drawIG();
  AI=pick(d.ai,AI);
  PH=pick(d.producthunt,PH);
  newsletters=pick(d.newsletters,newsletters);
  if(d.github&&(d.github.day||d.github.week||d.github.month))github=d.github;
  feeds=pick(d.feeds,feeds);
  drawTabs();drawRadar();
  if(d.topbar&&d.topbar.dia)document.getElementById('nav-date').innerHTML=d.topbar.dia.replace(/^(\w{3})\w*/,'$1').toLowerCase();
  if(d.gerado_em){const dt=new Date(d.gerado_em);
    document.getElementById('nav-date').innerHTML=dt.toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'}).replace('.','').replace('-feira','');}
}

/* primeira pintura (mock) + fetch real */
fillCtx(null);drawSales();drawAgenda();drawProjects();drawMarket();drawYT();drawIG();drawTabs();drawRadar();
function load(){return fetch('dashboard-data.json?t='+Date.now()).then(r=>r.ok?r.json():{}).then(render).catch(()=>{});}
load();
focoLoad();

/* refresh */
[['v-refresh','ti-refresh']].forEach(([id,ic0])=>{
  const b=document.getElementById(id);if(!b)return;
  b.addEventListener('click',()=>{const ic=b.querySelector('i');b.classList.add('spin');ic.classList.replace(ic0,'ti-loader-2');
    load().finally(()=>setTimeout(()=>{b.classList.remove('spin');ic.classList.replace('ti-loader-2',ic0);},700));});
});
</script>
