<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#05071a" />
<meta name="robots" content="noindex,nofollow" />
<title>Dashboard · Fábio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css" />
<style>
  :root{
    --bg-0:#05071a; --bg-1:#0b1031;
    --card:rgba(13,18,52,.55);
    --card-soft:rgba(255,255,255,.035);
    --brd:rgba(255,255,255,.08);
    --brd-2:rgba(255,255,255,.05);
    --accent:linear-gradient(98deg,#0075ff 0%,#7a3cff 100%);
    --accent-solid:#5b8cff;
    --green:#01d28e; --red:#ff5a65;
    --dame:#ff6b9d; --lov:#8b6cff;
    --txt:#fff; --muted:#9aa3c0; --muted-2:#6b7494;
    --r:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--txt);
    background:
      radial-gradient(1200px 700px at 82% -12%, rgba(122,60,255,.20), transparent 60%),
      radial-gradient(1000px 620px at -5% 112%, rgba(0,117,255,.16), transparent 55%),
      linear-gradient(160deg,var(--bg-1),var(--bg-0));
    background-attachment:fixed;overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:8px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}
  .scroll{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.14) transparent}

  .app{height:100vh;display:flex;flex-direction:column;
    gap:clamp(12px,1vw,20px);padding:clamp(14px,1.1vw,26px)}

  /* ── topbar ─────────────────────────────────────────── */
  .top{display:flex;align-items:center;justify-content:space-between;gap:18px;flex:0 0 auto}
  .hi .greet{font-size:clamp(19px,1.4vw,26px);font-weight:800;letter-spacing:-.3px;line-height:1.1}
  .hi .greet b{background:var(--accent);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .hi .date{font-size:13px;color:var(--muted);margin-top:3px}
  .hi .date::first-letter{text-transform:uppercase}
  .top-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .chips{display:flex;gap:9px;align-items:center}
  .chip{display:flex;align-items:center;gap:7px;padding:8px 13px;border-radius:13px;
    background:var(--card-soft);border:1px solid var(--brd);font-size:13px;backdrop-filter:blur(8px)}
  .chip i{font-size:16px;color:var(--accent-solid)}
  .chip b{font-weight:700}.chip .m{color:var(--muted);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .delta{font-size:11px;font-weight:800;display:flex;align-items:center;gap:1px}
  .delta i{font-size:13px}
  .delta.up{color:var(--green)}.delta.down{color:var(--red)}
  .upd{font-size:11.5px;color:var(--muted-2);display:flex;align-items:center;gap:6px;white-space:nowrap}
  .upd i{font-size:14px}

  /* ── grid principal ─────────────────────────────────── */
  .grid{flex:1 1 auto;min-height:0;display:grid;
    grid-template-columns:minmax(330px,380px) 1fr;gap:clamp(12px,1vw,20px)}
  .ops{min-height:0;display:flex;flex-direction:column;gap:clamp(12px,1vw,20px)}

  .card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);
    padding:clamp(15px,1vw,21px);display:flex;flex-direction:column;min-height:0;
    backdrop-filter:blur(14px);box-shadow:0 18px 50px -28px rgba(0,0,0,.7)}
  .card.fill{flex:1 1 0}
  .ch{display:flex;align-items:center;justify-content:space-between;gap:10px;flex:0 0 auto;margin-bottom:14px}
  .ch .lbl{display:flex;align-items:center;gap:9px;font-size:11px;font-weight:800;
    letter-spacing:1.1px;text-transform:uppercase;color:var(--muted)}
  .ch .lbl i{font-size:17px;color:var(--accent-solid)}
  .ch .lbl .sub{font-size:11px;font-weight:600;letter-spacing:.2px;text-transform:none;color:var(--muted-2)}
  .ch-r{display:flex;align-items:center;gap:7px}
  .nav{display:flex;align-items:center;gap:6px}
  .ib{width:30px;height:30px;display:grid;place-items:center;border-radius:9px;
    background:rgba(255,255,255,.05);border:1px solid var(--brd);color:var(--muted);
    cursor:pointer;font-size:16px;transition:.15s}
  .ib:hover{background:rgba(255,255,255,.11);color:#fff}
  .ib:active{transform:scale(.92)}
  .ib:disabled{opacity:.28;cursor:default}
  .ib.spin i{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* ── vendas (herói) ─────────────────────────────────── */
  .v-hero{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap}
  .v-tot{font-size:clamp(30px,2.6vw,40px);font-weight:800;letter-spacing:-1px;line-height:.95}
  .v-tot .c{font-size:.55em;font-weight:700;color:var(--muted);margin-right:3px}
  .v-delta{font-size:13px;font-weight:800;display:flex;align-items:center;gap:2px;padding-bottom:5px}
  .v-delta i{font-size:16px}
  .v-delta.up{color:var(--green)}.v-delta.down{color:var(--red)}
  .v-delta .vs{color:var(--muted-2);font-weight:600;font-size:11px;margin-left:3px}
  .v-kpis{display:flex;gap:18px;margin-top:6px;font-size:12px;color:var(--muted)}
  .v-kpis b{color:#dfe3f2;font-weight:700;font-size:13px}
  .v-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .v-store{background:var(--card-soft);border:1px solid var(--brd-2);border-radius:14px;padding:12px 13px}
  .v-store .nm{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--muted)}
  .v-store .nm .dot{width:9px;height:9px;border-radius:50%}
  .v-store .vv{font-size:18px;font-weight:800;letter-spacing:-.4px;margin:5px 0 2px}
  .v-store .ss{font-size:11px;color:var(--muted-2)}
  .v-spark{display:flex;align-items:flex-end;gap:5px;height:46px;margin-top:18px}
  .v-bar{flex:1;border-radius:5px 5px 3px 3px;background:rgba(255,255,255,.10);
    position:relative;transition:.2s;min-height:5px;cursor:pointer}
  .v-bar.on{background:var(--accent)}
  .v-bar:hover{filter:brightness(1.25)}
  .v-bar .bd{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);
    font-size:9px;color:var(--muted-2);font-weight:700;white-space:nowrap}
  .v-spark-wrap{margin-bottom:6px}

  /* ── listas genéricas ───────────────────────────────── */
  .list{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;margin:0 -4px;padding:0 4px}
  .empty{font-size:13px;color:var(--muted-2);padding:14px 2px}

  /* agenda */
  .ag{display:flex;gap:13px;padding:10px 0;border-top:1px solid var(--brd-2)}
  .ag:first-child{border-top:0}
  .ag .hr{font-size:14px;font-weight:800;color:var(--accent-solid);min-width:46px}
  .ag .desc{font-size:13.5px;color:#dfe3f2;line-height:1.35}

  /* projetos */
  .proj{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-top:1px solid var(--brd-2)}
  .proj:first-child{border-top:0}
  .proj .pn{font-size:13.5px;font-weight:600}
  .proj .ps{font-size:11px;color:var(--muted-2);margin-top:1px}
  .pbadge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;
    background:rgba(91,140,255,.16);color:#a9c2ff;flex:0 0 auto}

  /* ── radar (IA) ─────────────────────────────────────── */
  .radar{display:flex;flex-direction:column;min-height:0}
  .tabs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin:0 -2px;padding:0 2px 2px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:13px;
    background:var(--card-soft);border:1px solid var(--brd);color:var(--muted);
    font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab i{font-size:16px}
  .tab:hover{color:#fff;border-color:rgba(255,255,255,.16)}
  .tab.on{color:#fff;background:var(--accent);border-color:transparent;
    box-shadow:0 10px 24px -12px rgba(91,140,255,.8)}
  .subtabs{display:flex;gap:3px;align-items:center}
  .subtab{font-size:11.5px;font-weight:700;color:var(--muted);background:none;border:0;
    padding:4px 9px;border-radius:8px;cursor:pointer;font-family:inherit}
  .subtab:hover{color:#fff}
  .subtab.on{color:#fff;background:rgba(255,255,255,.09)}
  .r-list{flex:1 1 auto;min-height:0;overflow-y:auto;margin-top:14px;padding-right:4px;
    display:grid;grid-template-columns:1fr;gap:2px;align-content:start}

  /* item de notícia */
  .item{display:flex;gap:13px;padding:11px 9px;align-items:center;border-radius:14px;transition:.12s}
  .item:hover{background:rgba(255,255,255,.045)}
  .thumb{width:74px;height:56px;border-radius:11px;object-fit:cover;flex:0 0 auto;background:rgba(255,255,255,.06)}
  .item .body{flex:1;min-width:0}
  .item .ttl{font-size:13.5px;line-height:1.4;color:#eef0fb;font-weight:600;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap}
  .item .src{font-size:11px;color:var(--muted)}
  .item .when{font-size:11px;color:var(--muted-2)}
  .tag{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:7px;letter-spacing:.4px;text-transform:uppercase}
  .tag.claude{background:rgba(124,108,255,.18);color:#b3a9ff}
  .tag.gpt{background:rgba(1,210,142,.16);color:#4fe3b0}
  .tag.gemini{background:rgba(55,138,221,.18);color:#7db4ef}
  .tag.open{background:rgba(255,181,71,.16);color:#ffc875}
  .tag.gen{background:rgba(160,174,192,.16);color:#c2cbdb}
  .tag.pos{background:rgba(1,210,142,.15);color:#4fe3b0}
  .tag.biz{background:rgba(255,181,71,.15);color:#ffc875}

  /* feed/newsletter */
  .feed{display:flex;align-items:center;gap:13px;padding:11px 9px;border-radius:14px;transition:.12s}
  .feed:hover{background:rgba(255,255,255,.045)}
  .fthumb{position:relative;width:60px;height:48px;border-radius:11px;flex:0 0 auto;
    overflow:hidden;display:grid;place-items:center;background:rgba(255,255,255,.06)}
  .fthumb i{font-size:20px;color:var(--accent-solid)}
  .fthumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .feed .fb{flex:1;min-width:0}
  .feed .fhead{font-size:13.5px;font-weight:600;color:#eef0fb;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .feed .fmeta{display:flex;align-items:center;gap:7px;margin-top:5px;font-size:11px;color:var(--muted)}
  .fdot{color:var(--muted-2)}
  .fbadge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:7px;
    background:rgba(1,210,142,.16);color:#4fe3b0;flex:0 0 auto}

  /* github */
  .gh{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;
    padding:12px 9px;border-radius:14px;transition:.12s}
  .gh:hover{background:rgba(255,255,255,.045)}
  .gh .repo{font-size:13.5px;font-weight:700;color:#eef0fb}
  .gh .ghd{font-size:12px;color:var(--muted);line-height:1.4;margin:3px 0 4px}
  .gh .lang{font-size:10.5px;color:var(--muted-2);font-weight:600}
  .gh .star{font-size:12.5px;color:var(--green);font-weight:800;display:flex;align-items:center;gap:3px;flex:0 0 auto}

  /* detalhe (resumo no card) */
  .detail{display:flex;flex-direction:column;gap:11px;height:100%;overflow:auto;padding:2px}
  .d-back{align-self:flex-start;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);
    border:1px solid var(--brd);color:var(--muted);font-size:12.5px;font-weight:700;
    padding:8px 13px;border-radius:10px;cursor:pointer;font-family:inherit}
  .d-back:hover{color:#fff;background:rgba(255,255,255,.1)}
  .d-ttl{font-size:18px;font-weight:800;line-height:1.3;color:#fff;letter-spacing:-.2px}
  .d-src{font-size:11.5px;color:var(--muted-2);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .d-body{font-size:14px;line-height:1.65;color:#cdd3e6}
  .d-link{align-self:flex-start;margin-top:auto;display:flex;align-items:center;gap:7px;
    background:var(--accent);color:#fff;font-size:13px;font-weight:700;padding:10px 17px;
    border-radius:11px;box-shadow:0 10px 24px -12px rgba(91,140,255,.9)}
  .d-link:active{transform:scale(.97)}

  /* ── responsivo ─────────────────────────────────────── */
  @media (min-width:1700px){
    .grid{grid-template-columns:minmax(380px,420px) 1fr}
    .r-list{grid-template-columns:1fr 1fr;gap:4px 14px}
    .detail{grid-column:1 / -1}
  }

  /* tablet / notebook: empilha em fluxo rolável, jeito de app */
  @media (max-width:980px){
    body{overflow:auto}
    .app{height:auto;min-height:100vh}
    .grid{grid-template-columns:1fr;flex:0 0 auto}
    .card.fill{flex:0 0 auto}
    .list{overflow:visible;max-height:340px}
    .r-list{overflow:visible;max-height:none}
    .radar{min-height:auto}
  }

  /* celular */
  @media (max-width:560px){
    .app{padding:14px 13px calc(20px + env(safe-area-inset-bottom))}
    .top{position:sticky;top:0;z-index:30;flex-direction:column;align-items:stretch;gap:11px;
      margin:-14px -13px 2px;padding:14px 13px 12px;
      background:linear-gradient(180deg,rgba(5,7,26,.96),rgba(5,7,26,.78));
      backdrop-filter:blur(12px);border-bottom:1px solid var(--brd-2)}
    .top-right{justify-content:flex-start}
    .chips{width:100%;overflow-x:auto;scrollbar-width:none}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto}
    .upd{order:-1;width:100%}
    .v-split{grid-template-columns:1fr 1fr}
    .tab{padding:10px 16px;font-size:13.5px}
    .item,.feed,.gh{padding:12px 7px}
    .list{max-height:none}
    .card.fill .list,.card .list{max-height:380px}
  }
</style>
</head>
<body>
<div class="app">

  <!-- topbar -->
  <div class="top">
    <div class="hi">
      <div class="greet">Bom dia, <b>Fábio</b></div>
      <div class="date" id="date">sexta, 27 de junho</div>
    </div>
    <div class="top-right">
      <div class="chips" id="chips"></div>
      <div class="upd"><i class="ti ti-refresh-dot"></i>atualizado <b id="upd" style="margin-left:3px;color:var(--muted)">03h12</b></div>
    </div>
  </div>

  <div class="grid">
    <!-- OPERAÇÃO -->
    <div class="ops">
      <!-- vendas -->
      <div class="card" id="card-vendas">
        <div class="ch">
          <div class="lbl"><i class="ti ti-cash-register"></i>Vendas <span class="sub" id="v-day"></span></div>
          <div class="ch-r">
            <div class="nav" id="v-nav"></div>
            <button class="ib" id="v-refresh" title="Atualizar vendas das lojas"><i class="ti ti-refresh"></i></button>
          </div>
        </div>
        <div id="v-body"></div>
      </div>

      <!-- agenda -->
      <div class="card fill">
        <div class="ch">
          <div class="lbl"><i class="ti ti-calendar-event"></i>Agenda <span class="sub" id="ag-day"></span></div>
          <div class="nav" id="ag-nav"></div>
        </div>
        <div class="list scroll" id="ag-list"></div>
      </div>

      <!-- projetos -->
      <div class="card fill">
        <div class="ch"><div class="lbl"><i class="ti ti-layout-kanban"></i>Projetos em andamento</div></div>
        <div class="list scroll" id="proj-list"></div>
      </div>
    </div>

    <!-- RADAR DE IA -->
    <div class="card radar">
      <div class="ch">
        <div class="tabs" id="r-tabs"></div>
        <div class="subtabs" id="gh-sub" style="display:none">
          <button class="subtab on" data-p="day">dia</button>
          <button class="subtab" data-p="week">semana</button>
          <button class="subtab" data-p="month">mês</button>
        </div>
      </div>
      <div class="r-list scroll" id="r-list"></div>
    </div>
  </div>
</div>

  {i:'ti-world',n:'MIT Tech Review',h:'A corrida por um computador quântico realmente útil',resumo:'Panorama dos avanços recentes em hardware quântico.'},
  {i:'ti-world',n:'The Verge',h:'OpenAI lança tier enterprise com deploy on-prem',resumo:'Empresas agora podem rodar os modelos dentro da própria infraestrutura.'},
  {i:'ti-rss',n:'Hacker News',h:'Por que toda startup está lançando agentes de voz',resumo:'Discussão sobre a onda de produtos com voz em tempo real.'},
];

// ── helpers ─────────────────────────────────────────────────────────────────
const brl = n => Number(n||0).toLocaleString('pt-BR');
const isUrl = s => /^https?:/.test(s||'');
const thumb = n => isUrl(n.img) ? n.img : _img(n.img||'x');
const virg = v => String(v).replace('.',',');
function ago(s){
  if(!s) return '';
  const d=new Date(s); if(isNaN(d)) return '';
  const m=Math.floor((Date.now()-d)/60000);
  if(m<2) return 'agora'; if(m<60) return m+'min';
  const h=Math.floor(m/60); if(h<24) return h+'h';
  const dd=Math.floor(h/24); if(dd<7) return dd+'d';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}
function saudacao(){
  const h=new Date().getHours();
  return h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
}

// ── topbar ──────────────────────────────────────────────────────────────────
document.querySelector('.greet').innerHTML = saudacao()+', <b>Fábio</b>';
function fillTop(t){
  if(!t) return;
  if(t.dia) document.getElementById('date').textContent=t.dia;
  const delta = p => { const up=(+p||0)>=0; return `<span class="delta ${up?'up':'down'}"><i class="ti ti-trending-${up?'up':'down'}"></i>${virg(Math.abs(+p||0))}%</span>`; };
  const bk = v => v>=1000 ? virg((v/1000).toFixed(1))+'k' : String(v);
  let h='';
  if(t.clima) h+=`<div class="chip"><i class="ti ti-cloud-rain"></i><b>${t.clima.temp}°</b><span class="m">POA</span></div>`;
  if(t.usd)   h+=`<div class="chip"><i class="ti ti-currency-dollar"></i><span class="m">USD</span><b>${virg(t.usd.valor.toFixed(2))}</b>${delta(t.usd.pct)}</div>`;
  if(t.btc)   h+=`<div class="chip"><i class="ti ti-currency-bitcoin"></i><span class="m">BTC</span><b>${bk(t.btc.valor)}</b>${delta(t.btc.pct)}</div>`;
  if(h) document.getElementById('chips').innerHTML=h;
}
// chips iniciais (mock) até o JSON chegar
fillTop({clima:{temp:18},usd:{valor:5.42,pct:0.8},btc:{valor:67200,pct:-1.2}});

// ── vendas (herói) ──────────────────────────────────────────────────────────
let si=0;
const vBody=document.getElementById('v-body'), vDay=document.getElementById('v-day'), vNav=document.getElementById('v-nav');
function totDia(d){ return [d.dame[0]+d.lov[0], d.dame[1]+d.lov[1], d.dame[2]+d.lov[2]]; }
function drawSales(){
  const d=sales[si]; if(!d){vBody.innerHTML='<div class="empty">sem dados de venda</div>';return;}
  const tot=totDia(d);
  const prev=sales[si+1];
  let deltaHtml='';
  if(prev){
    const p=totDia(prev)[0];
    const pct = p ? ((tot[0]-p)/p*100) : 0;
    const up=pct>=0;
    deltaHtml=`<div class="v-delta ${up?'up':'down'}"><i class="ti ti-trending-${up?'up':'down'}"></i>${virg(Math.abs(pct).toFixed(0))}%<span class="vs">vs ${prev.dow.split(',')[0]}</span></div>`;
  }
  // sparkline: 7 dias do mais antigo (esq) ao mais novo (dir)
  const serie=[...sales].slice(0,7).reverse();
  const max=Math.max(...serie.map(s=>totDia(s)[0]),1);
  const onIdx=serie.length-1-si;
  const bars=serie.map((s,i)=>{
    const v=totDia(s)[0], hp=Math.max(6,Math.round(v/max*100));
    const lbl=(s.dow.match(/(\d+)/)||[])[1]||'';
    return `<div class="v-bar ${i===onIdx?'on':''}" data-i="${serie.length-1-i}" style="height:${hp}%" title="${s.dow}: R$ ${brl(v)}"><span class="bd">${lbl}</span></div>`;
  }).join('');

  vDay.textContent='· '+d.dow;
  vBody.innerHTML=`
    <div class="v-hero"><div class="v-tot"><span class="c">R$</span>${brl(tot[0])}</div>${deltaHtml}</div>
    <div class="v-kpis"><span><b>${tot[2]}</b> pedidos</span><span><b>${tot[1]}</b> pizzas</span></div>
    <div class="v-split">
      <div class="v-store"><div class="nm"><span class="dot" style="background:var(--dame)"></span>Dáme</div><div class="vv">R$ ${brl(d.dame[0])}</div><div class="ss">${d.dame[2]} ped · ${d.dame[1]} pz</div></div>
      <div class="v-store"><div class="nm"><span class="dot" style="background:var(--lov)"></span>Lov</div><div class="vv">R$ ${brl(d.lov[0])}</div><div class="ss">${d.lov[2]} ped · ${d.lov[1]} pz</div></div>
    </div>
    <div class="v-spark-wrap"><div class="v-spark">${bars}</div></div>`;

  vBody.querySelectorAll('.v-bar').forEach(b=>b.onclick=()=>{si=+b.dataset.i;drawSales();});
  vNav.innerHTML=`<button class="ib" ${si===sales.length-1?'disabled':''} data-d="1"><i class="ti ti-chevron-left"></i></button><button class="ib" ${si===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-right"></i></button>`;
  vNav.querySelectorAll('button').forEach(b=>b.onclick=()=>{si=Math.max(0,Math.min(sales.length-1,si+ +b.dataset.d));drawSales();});
}

// ── agenda (navegável por dia) ──────────────────────────────────────────────
let agi=0;
const agDay=document.getElementById('ag-day'), agNav=document.getElementById('ag-nav'), agList=document.getElementById('ag-list');
const DOW=['dom','seg','ter','qua','qui','sex','sáb'];
const ymd = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
function drawAgenda(){
  const base=new Date(); base.setHours(0,0,0,0);
  const day=new Date(base); day.setDate(base.getDate()+agi);
  const label = agi===0?'hoje' : agi===1?'amanhã' : `${DOW[day.getDay()]} ${String(day.getDate()).padStart(2,'0')}/${String(day.getMonth()+1).padStart(2,'0')}`;
  const hasData=(AGENDA||[]).some(a=>a.data);
  const evs = hasData ? AGENDA.filter(a=>a.data===ymd(day)) : (agi===0?AGENDA:[]);
  agDay.textContent='· '+label;
  agList.innerHTML = evs.length
    ? evs.map(a=>`<div class="ag"><div class="hr">${a.h}</div><div class="desc">${a.d}</div></div>`).join('')
    : `<div class="empty">sem compromissos</div>`;
  agNav.innerHTML=`<button class="ib" ${agi===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-left"></i></button><button class="ib" ${agi===7?'disabled':''} data-d="1"><i class="ti ti-chevron-right"></i></button>`;
  agNav.querySelectorAll('button').forEach(b=>b.onclick=()=>{agi=Math.max(0,Math.min(7,agi+ +b.dataset.d));drawAgenda();});
}

// ── projetos ────────────────────────────────────────────────────────────────
function drawProjects(){
  const el=document.getElementById('proj-list');
  el.innerHTML=(projects||[]).length
    ? projects.map(p=>`<div class="proj"><div><div class="pn">${p.n}</div><div class="ps">última atividade</div></div><span class="pbadge">${p.quando||p.tag||''}</span></div>`).join('')
    : `<div class="empty">nada recente</div>`;
}

// ── radar de IA (abas) ──────────────────────────────────────────────────────
const TABS=[
  {k:'noticias',   label:'Notícias',    icon:'ti-brain'},
  {k:'newsletters',label:'Newsletters', icon:'ti-mail'},
  {k:'github',     label:'GitHub',      icon:'ti-brand-github'},
  {k:'feeds',      label:'Feeds',       icon:'ti-rss'},
];
let radarTab='noticias', ghPeriod='day';
const rList=document.getElementById('r-list'), ghSub=document.getElementById('gh-sub');

const newsRow = (n,i) => `<a class="item" data-i="${i}" href="${n.url||'#'}" target="_blank" rel="noopener"><img class="thumb" src="${thumb(n)}" alt="" onerror="this.style.visibility='hidden'"><div class="body"><div class="ttl">${n.t}</div><div class="meta">${n.cat?`<span class="tag ${n.c||'gen'}">${n.cat}</span>`:''}<span class="src">${n.src||''}</span>${n.data?`<span class="when">· ${ago(n.data)}</span>`:''}</div></div></a>`;
const feedRow = (f,i) => `<a class="feed" data-i="${i}" href="${f.url||'#'}" target="_blank" rel="noopener"><span class="fthumb"><i class="ti ${f.i||'ti-rss'}"></i>${f.img?`<img src="${f.img}" alt="" loading="lazy" onerror="this.remove()">`:''}</span><div class="fb"><div class="fhead">${f.h}</div><div class="fmeta"><span>${f.n}</span>${f.s?`<span class="fdot">·</span><span>${f.s}</span>`:''}${f.data?`<span class="fdot">·</span><span>${ago(f.data)}</span>`:''}</div></div>${f.b?`<span class="fbadge">${f.b}</span>`:''}</a>`;
const ghRow = g => `<a class="gh" href="https://github.com/${g.r}" target="_blank" rel="noopener"><div><div class="repo">${g.r}</div><div class="ghd">${g.d||''}</div><div class="lang">${g.lang||''}</div></div><div class="star"><i class="ti ti-star"></i>${g.s||''}</div></a>`;

function radarData(){
  if(radarTab==='noticias')    return {items:(AI||[]),                         row:newsRow, detail:true};
  if(radarTab==='newsletters') return {items:(newsletters||[]),                row:feedRow, detail:true};
  if(radarTab==='feeds')       return {items:(feeds||[]).slice(0,24),          row:feedRow, detail:true};
  return {items:((github&&github[ghPeriod])||[]).slice(0,10),                  row:ghRow,   detail:false};
}
function renderTabs(){
  document.getElementById('r-tabs').innerHTML = TABS.map(t=>`<button class="tab ${t.k===radarTab?'on':''}" data-k="${t.k}"><i class="ti ${t.icon}"></i>${t.label}</button>`).join('');
}
function drawRadar(){
  ghSub.style.display = radarTab==='github' ? 'flex' : 'none';
  const {items,row}=radarData();
  rList.style.gridTemplateColumns = '';   // reset (CSS controla colunas)
  rList.innerHTML = items.length ? items.map(row).join('') : `<div class="empty">nada por aqui agora</div>`;
  rList.scrollTop=0;
}
function showDetail(it){
  const title=it.t||it.h||'', src=it.src||it.n||'';
  const resumo=it.resumo || 'Resumo não disponível. Use o link abaixo para ler no original.';
  rList.style.gridTemplateColumns='1fr';
  rList.innerHTML=`<div class="detail"><button class="d-back"><i class="ti ti-arrow-left"></i> voltar</button>
    <div class="d-ttl">${title}</div>
    <div class="d-src">${it.cat?`<span class="tag ${it.c||'gen'}">${it.cat}</span>`:''}<span>${src}</span>${it.data?`<span class="fdot">·</span><span>${ago(it.data)}</span>`:''}</div>
    <div class="d-body">${resumo}</div>
    <a class="d-link" href="${it.url||'#'}" target="_blank" rel="noopener">ler no original <i class="ti ti-external-link"></i></a></div>`;
  rList.querySelector('.d-back').onclick=drawRadar;
}
rList.onclick=e=>{
  const el=e.target.closest('.item,.feed'); if(!el) return;
  if(e.metaKey||e.ctrlKey||e.shiftKey) return;
  const {items,detail}=radarData(); if(!detail) return;
  const it=items[+el.dataset.i]; if(!it) return;
  e.preventDefault(); showDetail(it);
};
document.getElementById('r-tabs').onclick=e=>{
  const b=e.target.closest('.tab'); if(!b) return;
  radarTab=b.dataset.k; renderTabs(); drawRadar();
};
ghSub.onclick=e=>{
  const b=e.target.closest('.subtab'); if(!b) return;
  ghPeriod=b.dataset.p;
  ghSub.querySelectorAll('.subtab').forEach(x=>x.classList.toggle('on',x===b));
  drawRadar();
};

// ── render geral ────────────────────────────────────────────────────────────
const pick=(a,b)=>(a&&a.length)?a:b;
function render(d){
  d=d||{};
  fillTop(d.topbar);
  sales = pick(d.sales, sales); si=0; drawSales();
  AGENDA = (d.agenda&&d.agenda.length)?d.agenda:AGENDA; agi=0; drawAgenda();
  projects = pick(d.projects, projects); drawProjects();
  AI = pick(d.ai, AI);
  newsletters = pick(d.newsletters, newsletters);
  if(d.github && (d.github.day||d.github.week||d.github.month)) github=d.github;
  feeds = pick(d.feeds, feeds);
  renderTabs(); drawRadar();
  if(d.gerado_em){
    const dt=new Date(d.gerado_em);
    document.getElementById('upd').textContent =
      dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' '+
      dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
}

// primeira pintura com mock, depois busca o JSON real
renderTabs(); drawSales(); drawAgenda(); drawProjects(); drawRadar();
function load(){
  return fetch('dashboard-data.json?t='+Date.now())
    .then(r=>r.ok?r.json():{}).then(render).catch(()=>{});
}
load();

// botão atualizar vendas (rebusca o JSON; cache-bust)
const vRef=document.getElementById('v-refresh');
vRef.addEventListener('click',()=>{
  const ic=vRef.querySelector('i');
  vRef.classList.add('spin');ic.classList.replace('ti-refresh','ti-loader-2');
  load().finally(()=>setTimeout(()=>{vRef.classList.remove('spin');ic.classList.replace('ti-loader-2','ti-refresh');},700));
});
</script>
</body>
</html>
