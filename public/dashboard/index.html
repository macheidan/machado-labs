<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex,nofollow" />
<title>Dashboard · Fábio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css" />
<style>
  :root{
    --bg-0:#05071a; --bg-1:#0b1031;
    --card:linear-gradient(127deg, rgba(13,18,52,.92) 18%, rgba(9,12,33,.78) 80%);
    --card-brd:rgba(255,255,255,.08);
    --accent:linear-gradient(98deg,#0075ff 0%,#5c27fe 100%);
    --accent-solid:#3b6cff;
    --green:#01b574; --red:#e23b3b;
    --txt:#fff; --muted:#a0aec0; --muted-2:#6b7494;
    --r:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Plus Jakarta Sans',system-ui,sans-serif;color:var(--txt);
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(92,39,254,.18), transparent 60%),
      radial-gradient(1000px 600px at 0% 110%, rgba(0,117,255,.16), transparent 55%),
      linear-gradient(160deg,var(--bg-1),var(--bg-0));
    background-attachment:fixed;overflow:hidden;
  }
  .app{height:100vh;display:flex;flex-direction:column;gap:clamp(10px,.9vw,18px);padding:clamp(12px,1vw,22px)}
  a{color:inherit;text-decoration:none}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex:0 0 auto}
  .brand .day{font-size:clamp(16px,1.1vw,20px);font-weight:800;letter-spacing:.2px}
  .brand .sub{font-size:12px;color:var(--muted)}
  .chips{display:flex;gap:10px;align-items:center}
  .chip{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--card-brd);font-size:13px}
  .chip i{font-size:16px;color:var(--accent-solid)}
  .chip b{font-weight:700}.chip .m{color:var(--muted);font-size:12px}
  .delta{font-size:11px;font-weight:700;display:flex;align-items:center;gap:2px}
  .delta i{font-size:13px}
  .delta.up{color:var(--green)}.delta.down{color:var(--red)}
  .tb-right{display:flex;align-items:center;gap:14px}
  .updated{font-size:12px;color:var(--muted);text-align:right;line-height:1.35}
  .updated b{color:#fff;font-weight:600}
  .btn-refresh{display:flex;align-items:center;gap:9px;padding:11px 20px;border-radius:14px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;border:0;cursor:pointer;box-shadow:0 8px 24px -8px rgba(59,108,255,.7)}
  .btn-refresh:active{transform:scale(.97)}
  .btn-refresh.spin i{animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .grid{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 1.34fr 1fr 1fr;gap:clamp(10px,.85vw,18px)}
  .col{min-height:0;display:flex;flex-direction:column;gap:clamp(10px,.85vw,18px)}
  .card{background:var(--card);border:1px solid var(--card-brd);border-radius:var(--r);padding:clamp(13px,.9vw,19px);display:flex;flex-direction:column;min-height:0;backdrop-filter:blur(8px)}
  .card.grow{flex:1 1 0;min-height:0}
  .card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;flex:0 0 auto;gap:10px}
  .card-h .t{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;letter-spacing:.3px}
  .card-h .t i{font-size:18px;color:var(--accent-solid)}
  .card-h .t .sub{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:0}
  .live{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--green);font-weight:600}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .list{flex:1 1 auto;min-height:0;overflow:hidden}
  .navmini{display:flex;align-items:center;gap:6px}
  .icon-btn{width:26px;height:26px;display:grid;place-items:center;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid var(--card-brd);color:var(--muted);cursor:pointer;font-size:15px}
  .icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}
  .icon-btn:disabled{opacity:.3;cursor:default}
  .pg{display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:auto;padding-top:9px}
  .pgn{font-size:11px;color:var(--muted);font-weight:600;min-width:34px;text-align:center}

  /* vendas */
  .vt{width:100%;border-collapse:collapse;font-size:13.5px}
  .vt th{text-align:right;font-size:10px;letter-spacing:.5px;color:var(--muted-2);text-transform:uppercase;font-weight:700;padding:0 0 9px}
  .vt th:first-child{text-align:left}
  .vt td{padding:10px 0;border-top:1px solid rgba(255,255,255,.05);text-align:right}
  .vt td:first-child{text-align:left;font-weight:700}
  .vt .dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px}
  .vt .val{font-weight:800}
  .vt tfoot td{font-weight:800;border-top:1px solid rgba(255,255,255,.14)}

  /* news com imagem */
  .item{display:flex;gap:11px;padding:8px 6px;align-items:center;border-radius:11px}
  .item:hover{background:rgba(255,255,255,.04)}
  .thumb{width:62px;height:46px;border-radius:10px;object-fit:cover;flex:0 0 auto;background:rgba(255,255,255,.06)}
  .item .body{flex:1;min-width:0}
  .item .ttl{font-size:13px;line-height:1.38;color:#eef0fb;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .item .meta{display:flex;align-items:center;gap:8px;margin-top:4px}
  .item .src{font-size:11px;color:var(--muted)}
  .item .when{font-size:11px;color:var(--muted-2)}
  .tag{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:.4px;text-transform:uppercase}
  .tag.claude{background:rgba(124,108,255,.16);color:#a9a0ff}
  .tag.gpt{background:rgba(1,181,116,.15);color:#3ddca0}
  .tag.gemini{background:rgba(55,138,221,.16);color:#7db4ef}
  .tag.open{background:rgba(255,181,71,.15);color:#ffc875}
  .tag.gen{background:rgba(160,174,192,.15);color:#c2cbdb}
  .tag.pos{background:rgba(1,181,116,.14);color:#3ddca0}
  .tag.biz{background:rgba(255,181,71,.14);color:#ffc875}

  /* github */
  .gh{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid rgba(255,255,255,.05)}
  .gh:first-child{border-top:0}
  .gh .repo{font-size:13px;font-weight:700}
  .gh .ghd{font-size:11.5px;color:var(--muted);line-height:1.35;margin:2px 0 3px}
  .gh .lang{font-size:10.5px;color:var(--muted-2)}
  .gh .star{font-size:12px;color:var(--green);font-weight:700;display:flex;align-items:center;gap:3px;flex:0 0 auto}

  /* projetos */
  .proj{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.05)}
  .proj:first-child{border-top:0}
  .proj .pn{font-size:13px;font-weight:600}
  .proj .ps{font-size:11px;color:var(--muted)}
  .pbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:7px;background:rgba(59,108,255,.16);color:#9db8ff;flex:0 0 auto}

  /* agenda */
  .ag{display:flex;gap:12px;padding:8px 0;border-top:1px solid rgba(255,255,255,.05)}
  .ag:first-child{border-top:0}
  .ag .hr{font-size:13px;font-weight:700;color:var(--accent-solid);min-width:42px}
  .ag .agwhen{min-width:62px;flex:0 0 auto;display:flex;flex-direction:column;line-height:1.25}
  .ag .agwhen b{font-size:12px;font-weight:700;color:var(--accent-solid)}
  .ag .agwhen span{font-size:11px;color:var(--muted)}
  .ag .desc{font-size:13px;color:#dfe3f2}
  .agempty{font-size:12.5px;color:var(--muted-2);padding:10px 2px}

  /* feeds */
  .feed{display:flex;align-items:flex-start;gap:11px;padding:10px 0;border-top:1px solid rgba(255,255,255,.05)}
  .feed:first-child{border-top:0}
  .feed .fb{flex:1;min-width:0}
  .feed .fhead{font-size:13px;font-weight:600;color:#eef0fb;line-height:1.38;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .feed .fmeta{display:flex;align-items:center;gap:6px;margin-top:4px;font-size:11px;color:var(--muted)}
  .feed .fmeta i{font-size:14px;color:var(--accent-solid)}
  .feed .fdot{color:var(--muted-2)}
  .fbadge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;background:rgba(1,181,116,.16);color:#3ddca0;flex:0 0 auto}

  @media (max-width:1500px){
    body{overflow:auto}.app{height:auto;min-height:100vh}
    .grid{grid-template-columns:1fr 1fr}
  }
  @media (max-width:760px){
    .grid{grid-template-columns:1fr}
    .topbar{flex-wrap:wrap}
    .chips{order:3;width:100%;flex-wrap:wrap}
    /* accordion: cada quadro abre/fecha ao tocar no título */
    .card.grow{flex:0 0 auto}
    .card-h{cursor:pointer}
    .card-h::after{content:'';width:9px;height:9px;flex:0 0 auto;margin-left:10px;
      border-right:2px solid var(--muted);border-bottom:2px solid var(--muted);
      transform:rotate(45deg);transition:transform .2s}
    .card:not(.open) .card-h::after{transform:rotate(-45deg)}
    .card:not(.open) .list,
    .card:not(.open) #sales-body,
    .card:not(.open) .pg,
    .card:not(.open) .navmini{display:none}
  }
</style>
</head>

const isUrl = s => /^https?:/.test(s||'');
const thumb = n => isUrl(n.img) ? n.img : img(n.img||'x');
function ago(s){
  if(!s) return '';
  const d=new Date(s); if(isNaN(d)) return '';
  const m=Math.floor((Date.now()-d)/60000);
  if(m<2) return 'agora';
  if(m<60) return m+'min';
  const h=Math.floor(m/60); if(h<24) return h+'h';
  const dd=Math.floor(h/24); if(dd<7) return dd+'d';
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});
}

function pager(listId, pgId, items, per, row){
  const list=document.getElementById(listId), pg=document.getElementById(pgId);
  pg.innerHTML='';
  const pages=Math.ceil(items.length/per); let p=0;
  function draw(){
    list.innerHTML=items.slice(p*per,(p+1)*per).map(row).join('');
    if(pages>1){
      pg.innerHTML=`<button class="icon-btn" ${p===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-left"></i></button><span class="pgn">${p+1} / ${pages}</span><button class="icon-btn" ${p===pages-1?'disabled':''} data-d="1"><i class="ti ti-chevron-right"></i></button>`;
      pg.querySelectorAll('button').forEach(b=>b.onclick=()=>{p=Math.max(0,Math.min(pages-1,p+ +b.dataset.d));draw();});
    }
  }
  draw();
}

// vendas com navegação por dia
let si=0;
const sb=document.getElementById('sales-body'), sd=document.getElementById('sales-day'), sn=document.getElementById('sales-nav');
function drawSales(){
  const d=sales[si]; if(!d){sb.innerHTML='';return;}
  sd.textContent='· '+d.dow;
  const tot=[d.dame[0]+d.lov[0], d.dame[1]+d.lov[1], d.dame[2]+d.lov[2]];
  sb.innerHTML=`<table class="vt"><thead><tr><th>Loja</th><th>Valor</th><th>Pizzas</th><th>Pedidos</th></tr></thead>
  <tbody>
    <tr><td><span class="dot" style="background:#ff6b9d"></span>Dáme</td><td class="val">${brl(d.dame[0])}</td><td>${d.dame[1]}</td><td>${d.dame[2]}</td></tr>
    <tr><td><span class="dot" style="background:#5c27fe"></span>Lov</td><td class="val">${brl(d.lov[0])}</td><td>${d.lov[1]}</td><td>${d.lov[2]}</td></tr>
  </tbody>
  <tfoot><tr><td>Total</td><td class="val">${brl(tot[0])}</td><td>${tot[1]}</td><td>${tot[2]}</td></tr></tfoot></table>`;
  sn.innerHTML=`<button class="icon-btn" ${si===sales.length-1?'disabled':''} data-d="1"><i class="ti ti-chevron-left"></i></button><button class="icon-btn" ${si===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-right"></i></button>`;
  sn.querySelectorAll('button').forEach(b=>b.onclick=()=>{si=Math.max(0,Math.min(sales.length-1,si+ +b.dataset.d));drawSales();});
}

// agenda navegável por dia (hoje .. d+7), igual ao card de vendas
let AG = agenda, agi = 0;
const agDay=document.getElementById('ag-day'), agNav=document.getElementById('ag-nav'), agList=document.getElementById('agenda-list');
const ymd = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
const DOWAG=['dom','seg','ter','qua','qui','sex','sáb'];
function drawAgenda(){
  const base=new Date(); base.setHours(0,0,0,0);
  const day=new Date(base); day.setDate(base.getDate()+agi);
  const label = agi===0?'hoje' : agi===1?'amanhã' :
    `${DOWAG[day.getDay()]} ${String(day.getDate()).padStart(2,'0')}/${String(day.getMonth()+1).padStart(2,'0')}`;
  const hasData=(AG||[]).some(a=>a.data);
  const evs = hasData ? AG.filter(a=>a.data===ymd(day)) : (agi===0?AG:[]);
  agDay.textContent='· '+label;
  agList.innerHTML = evs.length
    ? evs.map(a=>`<div class="ag"><div class="hr">${a.h}</div><div class="desc">${a.d}</div></div>`).join('')
    : `<div class="agempty">sem compromissos</div>`;
  agNav.innerHTML=`<button class="icon-btn" ${agi===0?'disabled':''} data-d="-1"><i class="ti ti-chevron-left"></i></button><button class="icon-btn" ${agi===7?'disabled':''} data-d="1"><i class="ti ti-chevron-right"></i></button>`;
  agNav.querySelectorAll('button').forEach(b=>b.onclick=()=>{agi=Math.max(0,Math.min(7,agi+ +b.dataset.d));drawAgenda();});
}

// topbar (dia, clima, USD, BTC com variação)
function fillTop(t){
  if(!t) return;
  if(t.dia) document.querySelector('.brand .day').textContent=t.dia;
  const virg = v => String(v).replace('.',',');
  const delta = p => { const up=(+p||0)>=0; return `<span class="delta ${up?'up':'down'}"><i class="ti ti-trending-${up?'up':'down'}"></i>${virg(Math.abs(+p||0))}%</span>`; };
  const bk = v => v>=1000 ? virg((v/1000).toFixed(1))+'k' : String(v);
  let h='';
  if(t.clima) h+=`<div class="chip"><i class="ti ti-cloud-rain"></i><b>${t.clima.temp}°</b><span class="m">POA</span></div>`;
  if(t.usd)   h+=`<div class="chip"><i class="ti ti-currency-dollar"></i><span class="m">USD</span><b>${virg(t.usd.valor.toFixed(2))}</b>${delta(t.usd.pct)}</div>`;
  if(t.btc)   h+=`<div class="chip"><i class="ti ti-currency-bitcoin"></i><span class="m">BTC</span><b>${bk(t.btc.valor)}</b>${delta(t.btc.pct)}</div>`;
  if(h) document.querySelector('.chips').innerHTML=h;
}

const pick = (a,b) => (a&&a.length)?a:b;
function render(d){
  d=d||{};
  fillTop(d.topbar);
  sales = pick(d.sales, sales); si=0; drawSales();
  AG = pick(d.agenda, agenda); agi=0; drawAgenda();
  pager('proj-list','proj-pg', pick(d.projects, projects), 6, projRow);
  pager('ai-list','ai-pg',     pick(d.ai, ai),            5, newsRow);
  pager('gl-list','gl-pg',     pick(d.global, global),    5, newsRow);
  pager('bz-list','bz-pg',     pick(d.biz, biz),          5, newsRow);
  pager('gh-list','gh-pg',     pick(d.github, github),    4, ghRow);
  pager('feed-list','feed-pg', pick(d.feeds, feeds),      6, feedRow);
  if(d.gerado_em){
    const dt=new Date(d.gerado_em);
    document.getElementById('upd').textContent =
      dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' '+
      dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }
}

function load(){
  return fetch('dashboard-data.json?t='+Date.now())
    .then(r=>r.ok?r.json():{}).then(render).catch(()=>render({}));
}
load();

// refresh: rebusca o JSON publicado (cache-bust). Túnel p/ re-coleta vem depois.
const btn=document.getElementById('refresh');
btn.addEventListener('click',()=>{
  const ic=btn.querySelector('i');
  btn.classList.add('spin');ic.classList.replace('ti-refresh','ti-loader-2');
  load().finally(()=>setTimeout(()=>{btn.classList.remove('spin');ic.classList.replace('ti-loader-2','ti-refresh');},700));
});

// accordion no mobile: toca no título pra abrir/fechar (primeiro quadro já aberto)
const isMobile = () => matchMedia('(max-width:760px)').matches;
document.querySelectorAll('.card').forEach((card,i)=>{
  if(i===0) card.classList.add('open');
  const h=card.querySelector('.card-h');
  if(h) h.addEventListener('click',e=>{
    if(!isMobile() || e.target.closest('.navmini')) return; // ignora as setas de vendas
    card.classList.toggle('open');
  });
});
</script>
